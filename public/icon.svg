<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brand dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#040D1C"/>
      <stop offset="50%"  stop-color="#071828"/>
      <stop offset="100%" stop-color="#0C2240"/>
    </linearGradient>

    <!-- Blue brand gradient — matches --blue-grad in globals.css -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7DD3FC"/>
      <stop offset="35%"  stop-color="#38BDF8"/>
      <stop offset="70%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- Subtle inner glow for the lens -->
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#0EA5E9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded-square shape -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Subtle radial ambient light behind the camera body -->
  <ellipse cx="256" cy="320" rx="220" ry="170"
    fill="#0EA5E9" fill-opacity="0.06"/>

  <!-- ══════════════════════════════════════════
       CAMERA BODY
  ════════════════════════════════════════════ -->

  <!-- Camera outer body — wide, slightly tall -->
  <rect x="68" y="192" width="376" height="244" rx="34"
    fill="none" stroke="url(#blueGrad)" stroke-width="22"/>

  <!-- Viewfinder bump on top -->
  <path d="M186 192 L214 148 L298 148 L326 192"
    fill="none" stroke="url(#blueGrad)" stroke-width="22"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Shutter button nub (top right of bump) -->
  <circle cx="354" cy="172" r="18"
    fill="none" stroke="url(#blueGrad)" stroke-width="18"/>

  <!-- ══════════════════════════════════════════
       LENS ASSEMBLY
  ════════════════════════════════════════════ -->

  <!-- Outer lens ring -->
  <circle cx="240" cy="314" r="88"
    fill="none" stroke="url(#blueGrad)" stroke-width="22"/>

  <!-- Inner lens glow fill -->
  <circle cx="240" cy="314" r="64" fill="url(#lensGlow)"/>

  <!-- Inner iris ring -->
  <circle cx="240" cy="314" r="44"
    fill="none" stroke="url(#blueGrad)" stroke-width="14" stroke-opacity="0.55"/>

  <!-- Centre iris dot -->
  <circle cx="240" cy="314" r="16" fill="url(#blueGrad)" fill-opacity="0.80"/>

  <!-- Lens specular highlight (top-left arc) -->
  <path d="M204 290 A44 44 0 0 1 248 270"
    fill="none" stroke="white" stroke-width="8"
    stroke-linecap="round" stroke-opacity="0.30"/>

  <!-- ══════════════════════════════════════════
       SMALL DETAIL — flash indicator (top-left of body)
  ════════════════════════════════════════════ -->
  <rect x="96" y="220" width="40" height="26" rx="8"
    fill="url(#blueGrad)" fill-opacity="0.25"
    stroke="url(#blueGrad)" stroke-width="10" stroke-opacity="0.55"/>
</svg>
